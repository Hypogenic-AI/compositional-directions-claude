idea:
  title: Which linear directions are compositional?
  domain: nlp
  hypothesis: 'Not all linear directions in the residual stream of Transformer LLMs
    form coherent linear subspaces that can be composed; however, related vectors
    (such as those for "red" and "blue") may compose naturally. The research will
    map which discovered linear directions are coherent subspaces and which are singular,
    approximately linear directions.

    '
  background:
    description: 'There is skepticism regarding the claim that linear representations
      in the residual stream of Transformer LLMs form a fully compositional linear
      space. The idea is that while some directions may compose naturally (e.g., related
      color vectors), others may only appear linear in limited contexts. The goal
      is to systematically analyze which linear directions are truly compositional
      and which are not.

      '
  metadata:
    author: Ari Holtzman
